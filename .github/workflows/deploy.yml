name: CI / Build / Deploy

on:
  pull_request:
    branches: [develop, main]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]

jobs:
  # ── 1. CI ────────────────────────────────────────────────────────────────
  ci:
    name: Syntax & dependency check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check syntax (all key modules)
        run: |
          python -m py_compile config.py
          python -m py_compile api/main.py
          python -m py_compile api/routers/query.py
          python -m py_compile api/routers/players.py
          python -m py_compile api/routers/teams.py
          python -m py_compile api/routers/graph.py
          python -m py_compile api/routers/manage.py
          python -m py_compile ingestion/pipeline.py
          python -m py_compile ingestion/base.py
          python -m py_compile ingestion/loaders/combine_loader.py
          python -m py_compile ingestion/loaders/team_stats_loader.py
          python -m py_compile ingestion/loaders/nflreadpy_loader.py
          python -m py_compile graph/builder.py
          python -m py_compile db/duckdb_client.py

      - name: Verify pipeline imports cleanly
        run: python -c "import config; import ingestion.pipeline; import graph.builder; import api.main"

  # ── 2. Build & push Docker image ─────────────────────────────────────────
  build:
    name: Build & push image
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase image name
        run: echo "IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

  # ── 3. Deploy to VPS ─────────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: SSH deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/nfl-data-platform
            git fetch origin main
            git reset --hard origin/main
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" --password-stdin
            docker compose pull api
            docker compose up -d --force-recreate
            docker system prune -f
            echo "==> Waiting for API to be healthy..."
            for i in $(seq 1 30); do
              if docker compose exec -T api python -c "import api.main" 2>/dev/null; then
                echo "API is up after ${i}s"
                break
              fi
              sleep 5
            done
            echo "Deploy complete at $(date)"
